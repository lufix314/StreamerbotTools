<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quotes Dashboard</title>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #1a1a1a;
        --card-bg: #f5f5f5;
        --border-color: #e0e0e0;
        --accent-color: #9147ff;
        --accent-hover: #7c38e0;
        --danger-color: #e04040;
        --danger-hover-color: #ff4040;
        --success-color: #40c040;
        --drag-bg: #e8e0ff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #1a1a1a;
          --text-color: #f0f0f0;
          --card-bg: #2a2a2a;
          --border-color: #404040;
          --accent-color: #a863ff;
          --accent-hover: #b873ff;
          --danger-color: #ff6060;
          --danger-hover-color: #ff4040;
          --success-color: #60ff60;
          --drag-bg: #3a3050;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Roboto, sans-serif;
        background: var(--bg-color);
        color: var(--text-color);
        padding: 20px;
        min-height: 100vh;
      }

      h1,
      h2 {
        font-weight: 600;
      }

      h1 {
        font-size: 24pt;
        margin-bottom: 20px;
      }

      h2 {
        font-size: 18pt;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }

      .hint {
        font-size: 12pt;
        font-weight: 200;
        opacity: 0.8;
        vertical-align: center;
      }

      section {
        background: var(--card-bg);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
        border: 1px solid var(--border-color);
      }

      .input-group {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin: 8px 0;
      }

      label {
        font-size: 12pt;
      }

      input[type="number"],
      input[type="text"] {
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: var(--bg-color);
        color: var(--text-color);
        font-size: 14px;
        min-width: 80px;
        flex: 1;
      }

      input:focus {
        outline: 2px solid var(--accent-color);
        border-color: transparent;
      }

      textarea {
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: var(--bg-color);
        color: var(--text-color);
        font-size: 14px;
        font-family: inherit;
        resize: vertical;
        flex: 1;
      }

      textarea:focus {
        outline: 2px solid var(--accent-color);
        border-color: transparent;
      }

      button {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        background: var(--accent-color);
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      button:focus {
        outline: 2px solid var(--accent-color);
        outline-offset: 2px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .button-box {
        display: flex;
        justify-content: flex-end;
      }

      .small-btn {
        font-size: 12px;
        padding: 4px 12px;
      }

      .quotes-list {
        list-style: none;
      }

      .quotes-container {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
      }

      .quote-item {
        display: flex;
        width: 100%;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        transition: border-color 0.2s;
      }

      .quote-item:hover {
        border-color: var(--accent-color);
      }

      .quote-item-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
      }

      .quote-item-index {
        font-weight: bold;
        color: var(--accent-color);
        font-size: 10pt;
      }

      .quote-item-quote {
        font-size: 14px;
        font-style: italic;
      }

      .quote-item-author {
        font-size: 12px;
        opacity: 0.8;
      }

      .clip-link {
        color: var(--accent-color);
        text-decoration: none;
        font-size: 12px;
      }

      .clip-link:hover {
        text-decoration: underline;
      }

      .delete-btn {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--danger-color);
        border: none;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 8px;
      }

      .delete-btn:hover:not(:disabled) {
        background: var(--danger-hover-color);
      }

      .delete-btn:focus:not(:disabled) {
        outline: 2px solid var(--danger-color);
        outline-offset: 2px;
      }

      .delete-btn svg {
        width: 14px;
        height: 14px;
      }

      .empty-list {
        text-align: center;
        color: var(--text-color);
        opacity: 0.6;
        padding: 40px;
      }

      main {
        max-width: 800px;
        margin: 0 auto;
      }

      .hidden {
        display: none !important;
      }

      label.required::after {
        content: " *";
        color: var(--danger-color);
      }

      input:required:user-invalid,
      textarea:required:user-invalid {
        border-color: var(--danger-color);
      }

      @media (max-width: 600px) {
        body {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Quotes Dashboard</h1>

      <section aria-labelledby="add-quote-heading">
        <h2 id="add-quote-heading">New Quote</h2>
        <form id="add-quote-form" novalidate>
          <div class="input-group">
            <label for="quote-input" class="required hidden">Quote text:</label>
            <textarea
              id="quote-input"
              name="quote"
              rows="3"
              placeholder="Enter the quote text..."
              required
            ></textarea>
          </div>
          <div class="input-group">
            <label for="author-input" class="required">Author:</label>
            <input
              type="text"
              id="author-input"
              name="author"
              placeholder="Enter author name..."
              required
            />
          </div>
          <div class="input-group">
            <label for="clip-id-input">Clip ID/URL:</label>
            <input
              type="text"
              id="clip-id-input"
              name="clipId"
              placeholder="e.g., ClipIdOrLink"
            />
          </div>
          <div class="button-box">
            <button type="submit">Add Quote</button>
          </div>
        </form>
      </section>

      <section aria-labelledby="quotes-heading">
        <h2 id="quotes-heading">
          <span>Quotes <span id="quotes-count" class="hint">(0)</span></span>
        </h2>
        <ul id="quotes-list" class="quotes-list">
          <li class="empty-list">No quotes available</li>
        </ul>
      </section>
    </main>

    <script type="module" src="config.js"></script>
    <script type="module" src="dashboard.js"></script>
  </body>
</html>
