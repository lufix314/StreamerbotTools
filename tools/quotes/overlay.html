<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Random Quotes</title>
    <style>
      :root {
        --fade-duration: 1s;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        overflow: hidden;
      }

      .twitch-clip {
        width: 100%;
        border: none;
      }

      .twitch-clip.fade-in {
        opacity: 1;
        transition: opacity var(--fade-duration) ease-in-out;
      }

      .twitch-clip.fade-out {
        opacity: 0;
        transition: opacity var(--fade-duration) ease-in-out;
      }

      #no-connection {
        font-style: italic;
        color: red;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .hidden {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <video
      id="clipplayer"
      class="twitch-clip fade-out"
      playsinline
      webkit-playsinline
      preload="metadata"
      muted
      disablePictureInPicture
      disableRemotePlayback
    ></video>

    <div id="no-connection">Overlay Could not connect to Streamer.bot</div>

    <script type="module" src="config.js"></script>
    <script type="module" src="overlay.js"></script>
  </body>
</html>
