name: Build and Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all tools
        run: pnpm build

      - name: Upload build directory
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build files
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./build

      - name: Create tool zips
        run: |
          cd "build"
          for tool_dir in ./*/; do
            tool_name=$(basename "$tool_dir")
            source_dir="tools/$tool_name"

            # Copy non-source files from source to build directory
            find "$source_dir" -maxdepth 1 -type f ! -name "*.ts" ! -name "*.html" -exec cp {} "$tool_dir/" \;

            # Create zip from combined directory
            cd "$tool_dir"
            zip -r "${tool_name}.zip" $tool_dir
            cd ..
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download build files
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./build"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
